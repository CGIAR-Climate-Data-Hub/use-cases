name: Link check

on:
  pull_request:
    paths:
      - '**/*.md'
  schedule:
    - cron: '0 6 * * 1'  # weekly Monday 06:00 UTC

jobs:
  links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --no-progress
            --exclude '^\.\./\.\./use_cases/'
            --exclude 'localhost'
            '**/*.md'
          fail: true
