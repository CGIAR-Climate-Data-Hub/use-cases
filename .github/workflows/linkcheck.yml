name: Link check

on:
  pull_request:
    paths:
      - '**/*.md'
  schedule:
    - cron: '0 6 * * 1'  # weekly Monday 06:00 UTC

jobs:
  links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --no-progress
            --timeout 30
            --max-retries 3
            --exclude '^\.\./\.\./use_cases/'
            --exclude 'localhost'
            --exclude 'cgiar-climate-data-hub\.github\.io'
            --exclude 'cgiar\.sharepoint\.com'
            --exclude 'spei\.csic\.es'
            --exclude 'earthdata\.nasa\.gov'
            --exclude 'glad\.umd\.edu'
            --exclude 'ioe\.ifad\.org'
            --exclude 'mics\.unicef\.org'
            --exclude 'imf\.org'
            --exclude 'ipcinfo\.org'
            --exclude 'oecd\.org'
            --exclude 'acleddata\.com'
            --exclude 'climatewatchdata\.org'
            --exclude-path 'BRIEF_TEMPLATE.md'
            --exclude-path 'b4t/archive'
            '**/*.md'
          fail: true
